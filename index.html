  <script>
(function () {
  const WDM = window.WDM = window.WDM || {};

  WDM.PLATFORM_DL = {
    android: { label: 'Android', emoji: '🤖', mobile: true, exts: ['.apk'] },
    ios: { label: 'iOS', emoji: '📱', mobile: true, exts: ['.ipa'] },
    windows: { label: 'Windows', emoji: '🪟', mobile: false, exts: ['.exe', '.msi', '.zip'] },
    macos: { label: 'macOS', emoji: '🍎', mobile: false, exts: ['.dmg', '.pkg'] },
    linux: { label: 'Linux', emoji: '🐧', mobile: false, exts: ['.appimage', '.deb', '.tar.gz', '.zip'] }
  };

  WDM.detectVisitorPlatform = function () {
    const ua = navigator.userAgent || '';
    const plat = (navigator.userAgentData?.platform || navigator.platform || '').toLowerCase();
    const isAndroid = /android/i.test(ua);
    const isIOS = /iphone|ipad|ipod/i.test(ua)
      || (plat.includes('mac') && navigator.maxTouchPoints > 1);
    if (isIOS) return 'ios';
    if (isAndroid) return 'android';
    if (/win/i.test(ua) || plat.includes('win')) return 'windows';
    if (/mac/i.test(ua) || plat.includes('mac')) return 'macos';
    if (/linux/i.test(ua) || plat.includes('linux')) return 'linux';
    return null;
  };

  WDM.isMobileVisitor = function () {
    const p = WDM.detectVisitorPlatform();
    return p === 'android' || p === 'ios';
  };

  WDM.platformMeta = function (pid) {
    return WDM.PLATFORM_DL[pid] || { label: pid, emoji: '📦', mobile: false, exts: [] };
  };

  WDM.platformUrl = function (app, pid) {
    const map = app.platformDownloads || {};
    if (map[pid] && String(map[pid]).trim()) return String(map[pid]).trim();
    if (pid === app.primaryPlatform && app.downloadUrl) return String(app.downloadUrl).trim();
    return '';
  };

  WDM.parseGithubRepo = function (url) {
    try {
      const u = new URL(url.trim());
      if (!u.hostname.includes('github.com')) return null;
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts.length < 2) return null;
      return [parts[0], parts[1].replace(/\.git$/, '')];
    } catch { return null; }
  };

  WDM.isStoreUrl = function (url) {
    const u = (url || '').toLowerCase();
    return u.includes('play.google.com')
      || u.includes('apps.apple.com')
      || u.includes('testflight.apple.com')
      || u.includes('apps.microsoft.com')
      || u.includes('microsoft.com/store')
      || u.includes('macappstore.apple.com');
  };

  WDM.isDirectFileUrl = function (url, platformId) {
    const u = (url || '').trim().toLowerCase();
    if (!u || u.startsWith('[')) return false;
    if (u.includes('/releases/download/')) return true;
    const meta = WDM.platformMeta(platformId);
    return meta.exts.some(function (ext) {
      return u.endsWith(ext) || u.includes(ext + '?');
    });
  };

  WDM.fetchGithubLatestAssets = async function (repoUrl) {
    const slug = WDM.parseGithubRepo(repoUrl);
    if (!slug) return null;
    const res = await fetch(
      'https://api.github.com/repos/' + slug[0] + '/' + slug[1] + '/releases/latest',
      { headers: { Accept: 'application/vnd.github+json' } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    return (data.assets || []).map(function (a) {
      return { name: a.name, url: a.browser_download_url };
    });
  };

  WDM.pickAssetUrl = function (assets, platformId) {
    if (!assets || !assets.length) return null;
    const meta = WDM.platformMeta(platformId);
    const lower = function (s) { return (s || '').toLowerCase(); };
    for (let i = 0; i < meta.exts.length; i++) {
      const ext = meta.exts[i];
      const hit = assets.find(function (a) { return lower(a.name).endsWith(ext); });
      if (hit) return hit.url;
    }
    const hints = platformId === 'windows' ? ['windows', 'win', '_win']
      : platformId === 'macos' ? ['macos', 'mac', '_mac', 'darwin']
      : platformId === 'android' ? ['android', '_apk']
      : platformId === 'linux' ? ['linux', 'appimage']
      : [platformId];
    for (let h = 0; h < hints.length; h++) {
      const hint = hints[h];
      const hit = assets.find(function (a) {
        const n = lower(a.name);
        return n.includes(hint) && meta.exts.some(function (e) { return n.endsWith(e); });
      });
      if (hit) return hit.url;
    }
    return null;
  };

  WDM.resolveDownloadUrl = async function (url, platformId) {
    if (!url || url.startsWith('[')) return null;
    if (WDM.isStoreUrl(url)) return url;
    if (WDM.isDirectFileUrl(url, platformId)) return url;
    if (url.includes('github.com')) {
      const assets = await WDM.fetchGithubLatestAssets(url);
      const picked = WDM.pickAssetUrl(assets, platformId);
      if (picked) return picked;
    }
    return WDM.isDirectFileUrl(url, platformId) ? url : null;
  };

  WDM.crossDeviceKind = function (pid, visitor) {
    if (!visitor || visitor === pid) return null;
    const target = WDM.platformMeta(pid);
    const here = WDM.platformMeta(visitor);
    if (target.mobile && !here.mobile) return 'need_mobile';
    if (!target.mobile && here.mobile) return 'need_desktop';
    return null;
  };

  WDM.closeGuide = function () {
    document.getElementById('wdm-download-guide')?.remove();
  };

  WDM.showGuide = function (html, footerHtml) {
    WDM.closeGuide();
    const wrap = document.createElement('div');
    wrap.id = 'wdm-download-guide';
    wrap.style.cssText = 'position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.72);backdrop-filter:blur(6px)';
    wrap.innerHTML = '<div style="max-width:28rem;width:100%;border-radius:16px;padding:24px;background:#12141c;border:1px solid rgba(255,255,255,.1);color:#f4f4f5;font-family:system-ui,sans-serif">'
      + html
      + (footerHtml || '<button type="button" id="wdm-guide-close" style="margin-top:16px;width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;cursor:pointer">닫기</button>')
      + '</div>';
    wrap.addEventListener('click', function (e) { if (e.target === wrap) WDM.closeGuide(); });
    document.body.appendChild(wrap);
    document.getElementById('wdm-guide-close')?.addEventListener('click', WDM.closeGuide);
  };

  WDM.copyText = async function (text) {
    try { await navigator.clipboard.writeText(text); return true; } catch { return false; }
  };

  WDM.qrUrl = function (data) {
    return 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(data);
  };

  WDM.showNeedMobileGuide = function (app, pid) {
    const meta = WDM.platformMeta(pid);
    const pageUrl = location.href;
    WDM.showGuide(
      '<p style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#a5b4fc;margin:0 0 8px">' + meta.label + ' 설치</p>'
      + '<h3 style="margin:0 0 12px;font-size:1.25rem">' + meta.emoji + ' 스마트폰에서 받아 주세요</h3>'
      + '<p style="font-size:14px;color:#a1a1aa;line-height:1.6;margin:0 0 16px">'
      + meta.label + ' 앱은 PC에서 실행되지 않아요. <strong style="color:#fde68a">폰으로 이 페이지</strong>를 열면 버튼 <strong>한 번</strong>으로 설치·업데이트됩니다.</p>'
      + '<div style="text-align:center;margin:16px 0"><img src="' + WDM.qrUrl(pageUrl) + '" width="180" height="180" alt="QR" style="border-radius:12px;background:#fff;padding:8px" /></div>'
      + '<ol style="font-size:13px;color:#d4d4d8;line-height:1.7;padding-left:1.2rem;margin:0">'
      + '<li>QR 스캔 또는 링크를 폰으로 보내기</li>'
      + '<li>이 페이지에서 <strong>' + meta.label + ' 다운로드</strong> 버튼</li>'
      + '<li>이미 설치됐으면 <strong>업데이트</strong> — 데이터 유지</li>'
      + '</ol>',
      '<button type="button" id="wdm-copy-page-link" style="width:100%;padding:10px;border-radius:12px;border:none;background:#4f46e5;color:#fff;font-weight:600;cursor:pointer;margin-bottom:8px">🔗 이 페이지 링크 복사</button>'
      + '<button type="button" id="wdm-guide-close" style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;cursor:pointer">닫기</button>'
    );
    setTimeout(function () {
      document.getElementById('wdm-copy-page-link')?.addEventListener('click', async function () {
        const ok = await WDM.copyText(pageUrl);
        this.textContent = ok ? '✓ 복사됨' : '복사 실패 — 주소창에서 복사';
      });
      document.getElementById('wdm-guide-close')?.addEventListener('click', WDM.closeGuide);
    }, 0);
  };

  WDM.showNeedDesktopGuide = function (app, pid, rawUrl, onDownload) {
    const meta = WDM.platformMeta(pid);
    const pageUrl = location.href;
    WDM.showGuide(
      '<p style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#a5b4fc;margin:0 0 8px">' + meta.label + ' 설치</p>'
      + '<h3 style="margin:0 0 12px;font-size:1.25rem">' + meta.emoji + ' PC에서 받아 주세요</h3>'
      + '<p style="font-size:14px;color:#a1a1aa;line-height:1.6;margin:0 0 12px">'
      + meta.label + ' 앱은 휴대폰에서 실행되지 않아요. <strong style="color:#fde68a">Windows/Mac PC</strong>에서 이 페이지를 열고 다운로드하세요.</p>'
      + '<ol style="font-size:13px;color:#d4d4d8;line-height:1.7;padding-left:1.2rem;margin:0 0 12px">'
      + '<li>아래 링크를 PC로 보내기 (카톡·메일)</li>'
      + '<li>PC 브라우저에서 열기 → 다운로드 버튼 한 번</li>'
      + '<li>설치 파일 실행 → 기존 앱 있으면 <strong>업데이트</strong></li>'
      + '</ol>',
      '<button type="button" id="wdm-copy-page-link" style="width:100%;padding:10px;border-radius:12px;border:none;background:#4f46e5;color:#fff;font-weight:600;cursor:pointer;margin-bottom:8px">🔗 PC에 보낼 링크 복사</button>'
      + '<button type="button" id="wdm-force-dl" style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);color:#e4e4e7;cursor:pointer;margin-bottom:8px">그래도 이 폰에 파일 받기</button>'
      + '<button type="button" id="wdm-guide-close" style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;cursor:pointer">닫기</button>'
    );
    setTimeout(function () {
      document.getElementById('wdm-copy-page-link')?.addEventListener('click', async function () {
        const ok = await WDM.copyText(pageUrl);
        this.textContent = ok ? '✓ 복사됨' : '복사 실패';
      });
      document.getElementById('wdm-force-dl')?.addEventListener('click', function () {
        WDM.closeGuide();
        if (onDownload) onDownload();
      });
      document.getElementById('wdm-guide-close')?.addEventListener('click', WDM.closeGuide);
    }, 0);
  };

  WDM.showInstallHelp = function (pid) {
    const tips = {
      android: '<h3 style="margin:0 0 12px">📲 Android 설치</h3><ol style="font-size:13px;color:#d4d4d8;line-height:1.7;padding-left:1.2rem;margin:0"><li>다운로드된 .apk 탭</li><li>「알 수 없는 앱」 허용 (필요 시)</li><li>이미 있으면 <strong>업데이트</strong> — 데이터 유지</li></ol>',
      ios: '<h3 style="margin:0 0 12px">📱 iOS</h3><p style="font-size:13px;color:#d4d4d8;line-height:1.6">App Store / TestFlight 페이지에서 <strong>업데이트</strong> 또는 <strong>받기</strong>를 누르세요.</p>',
      windows: '<h3 style="margin:0 0 12px">🪟 Windows 설치</h3><ol style="font-size:13px;color:#d4d4d8;line-height:1.7;padding-left:1.2rem;margin:0"><li>다운로드된 .exe 실행</li><li>「Windows가 PC를 보호」 → <strong>추가 정보</strong> → 실행</li><li>이미 설치됐으면 <strong>업데이트</strong> — 설정·데이터 유지</li></ol>',
      macos: '<h3 style="margin:0 0 12px">🍎 Mac 설치</h3><ol style="font-size:13px;color:#d4d4d8;line-height:1.7;padding-left:1.2rem;margin:0"><li>.dmg 열기 → 앱을 Applications로 드래그</li><li>기존 앱이 있으면 <strong>덮어쓰기</strong></li><li>데이터는 ~/Library 에 그대로 유지</li></ol>',
      linux: '<h3 style="margin:0 0 12px">🐧 Linux</h3><ol style="font-size:13px;color:#d4d4d8;line-height:1.7;padding-left:1.2rem;margin:0"><li>.AppImage → 실행 권한 부여 후 실행</li><li>.deb → 패키지 관리자로 설치</li></ol>'
    };
    const html = tips[pid];
    if (html) WDM.showGuide(html);
  };

  WDM.triggerFileDownload = function (url) {
    const a = document.createElement('a');
    a.href = url;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    a.remove();
  };

  WDM.notFoundGuide = function (pid) {
    const meta = WDM.platformMeta(pid);
    const exts = meta.exts.join(' · ') || '설치 파일';
    WDM.showGuide(
      '<h3 style="margin:0 0 12px">' + meta.emoji + ' 파일을 찾지 못했어요</h3>'
      + '<p style="font-size:14px;color:#a1a1aa;line-height:1.6">GitHub Releases에 <strong>' + exts + '</strong> 파일이 있는지 확인해 주세요.</p>'
      + '<p style="font-size:12px;color:#71717a;margin-top:12px">직접 링크 예:<br>'
      + '<code style="color:#a5b4fc">…/releases/download/v1.0/앱' + (meta.exts[0] || '') + '</code></p>'
    );
  };

  WDM._runDownload = async function (url, pid, btn) {
    const prev = btn?.innerHTML;
    if (btn) { btn.disabled = true; btn.textContent = '준비 중…'; }
    try {
      const resolved = await WDM.resolveDownloadUrl(url, pid);
      if (!resolved) {
        WDM.notFoundGuide(pid);
        return;
      }
      if (WDM.isStoreUrl(resolved)) {
        window.open(resolved, '_blank', 'noopener');
        return;
      }
      WDM.triggerFileDownload(resolved);
      setTimeout(function () { WDM.showInstallHelp(pid); }, 1000);
    } finally {
      if (btn) {
        btn.disabled = false;
        if (prev) btn.innerHTML = prev;
      }
    }
  };

  WDM.startDownload = async function (app, pid, btn) {
    const url = WDM.platformUrl(app, pid);
    if (!url) {
      alert('다운로드 링크가 아직 준비되지 않았어요.');
      return;
    }
    const visitor = WDM.detectVisitorPlatform();
    const cross = WDM.crossDeviceKind(pid, visitor);
    if (cross === 'need_mobile') {
      WDM.showNeedMobileGuide(app, pid);
      return;
    }
    if (cross === 'need_desktop') {
      WDM.showNeedDesktopGuide(app, pid, url, function () {
        WDM._runDownload(url, pid, btn);
      });
      return;
    }
    await WDM._runDownload(url, pid, btn);
  };

  WDM.startManagerDownload = async function (pid, btn) {
    const url = (window.MANAGER_SELF?.downloads?.[pid] || '').trim();
    if (!url) return;
    await WDM.startDownload({
      id: 'web-deploy-manager',
      primaryPlatform: pid,
      platformDownloads: window.MANAGER_SELF?.downloads || {},
      downloadUrl: url
    }, pid, btn);
  };

  document.addEventListener('click', function (e) {
    const mgr = e.target.closest('[data-wdm-manager-dl]');
    if (mgr) {
      e.preventDefault();
      WDM.startManagerDownload(mgr.dataset.wdmManagerDl, mgr);
      return;
    }
    const btn = e.target.closest('[data-wdm-download]');
    if (!btn) return;
    e.preventDefault();
    const app = (window.APPS || []).find(function (a) { return a.id === btn.dataset.wdmApp; });
    if (!app) return;
    WDM.startDownload(app, btn.dataset.wdmPlatform, btn);
  });
})();
</script>

  <script>
    let selectedAppId = APPS.find(a => a.featured)?.id ?? APPS[0]?.id;
    let activePlatformId = null;

    function detectVisitorPlatform() {
      const ua = navigator.userAgent || '';
      const plat = (navigator.userAgentData?.platform || navigator.platform || '').toLowerCase();
      const isAndroid = /android/i.test(ua);
      const isIOS = /iphone|ipad|ipod/i.test(ua)
        || (plat.includes('mac') && navigator.maxTouchPoints > 1);
      if (isIOS) return 'ios';
      if (isAndroid) return 'android';
      if (/win/i.test(ua) || plat.includes('win')) return 'windows';
      if (/mac/i.test(ua) || plat.includes('mac')) return 'macos';
      if (/linux/i.test(ua) || plat.includes('linux')) return 'linux';
      return null;
    }

    function isMobileVisitor() {
      const p = detectVisitorPlatform();
      return p === 'android' || p === 'ios';
    }

    function isDesktopPlatform(pid) {
      return pid === 'windows' || pid === 'macos' || pid === 'linux';
    }

    function isMobilePlatform(pid) {
      return pid === 'android' || pid === 'ios';
    }

    function platformMatchesVisitor(pid) {
      const visitor = detectVisitorPlatform();
      if (!visitor) return true;
      return pid === visitor;
    }

    function pickInitialPlatform(app) {
      const ids = app.platforms || ['windows'];
      const visitor = detectVisitorPlatform();
      if (visitor && ids.includes(visitor)) return visitor;
      return app.primaryPlatform || ids[0];
    }

    function appAccent(app) {

      const target = ch.isStore ? ' target="_blank" rel="noopener noreferrer"' : '';

      const ids = app.platforms || ['windows'];
      const primary = app.primaryPlatform || ids[0];
      const visitor = detectVisitorPlatform();
      if (!activePlatformId || !ids.includes(activePlatformId)) {
        activePlatformId = pickInitialPlatform(app);
      }
      const active = PLATFORM_META[activePlatformId] || PLATFORM_META.windows;
      const showMismatch = visitor && !platformMatchesVisitor(activePlatformId);

      const chips = ids.map((pid, i) => {
        const meta = PLATFORM_META[pid] || { label: pid, emoji: '📦', color: '#6366f1' };
        const isActive = pid === activePlatformId;
        const isPrimary = pid === primary;
        const isStore = channelMeta(platformChannel(app, pid)).isStore;
        const isVisitorMatch = visitor && pid === visitor;
        return `
          <button type="button" data-pid="${pid}"
            class="platform-chip glass rounded-2xl px-4 py-3 flex items-center gap-2 border ${isActive ? 'active border-indigo-400/60' : 'border-white/5'} ${isVisitorMatch ? 'is-visitor-match' : ''}"
            style="--i:${i}; ${isActive ? 'border-color:'+meta.color+'55' : ''}">
            <span class="text-2xl">${meta.emoji}</span>
            <div class="text-left">
              <p class="text-sm font-semibold text-white flex items-center gap-1.5 flex-wrap">
                ${meta.label}
                ${isVisitorMatch ? '<span class="visitor-badge">이 기기용</span>' : ''}
                ${isStore ? '<span class="chip-store-dot" title="공식 스토어"></span>' : ''}
                ${isPrimary ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300">메인</span>' : ''}
              </p>
              <p class="text-[10px] text-zinc-500">${isStore ? channelMeta(platformChannel(app,pid)).label : meta.shortLabel}</p>
            </div>
          </button>`;
      }).join('');

      const activeCh = channelMeta(platformChannel(app, activePlatformId));
      const dlSection = renderLinkButton(app, activePlatformId);
      const hintText = activeCh.isStore
        ? activeCh.label + ' 공식 페이지로 이동합니다'
        : active.downloadHint;

      const mismatchBanner = showMismatch ? `
        <div class="mismatch-banner mt-4 max-w-md mx-auto">
          <p class="text-sm font-semibold text-amber-200">⚠️ 지금 기기와 다른 버전이에요</p>
          <p class="text-xs text-amber-100/80 mt-1 leading-relaxed">
            ${isMobileVisitor() && isDesktopPlatform(activePlatformId)
              ? 'Windows/Mac 앱은 휴대폰에서 실행할 수 없어요. 버튼을 누르면 PC로 보낼 링크가 나옵니다.'
              : !isMobileVisitor() && isMobilePlatform(activePlatformId)
                ? 'Android/iOS 앱은 스마트폰에서 받으세요. 버튼 → QR 코드 — GitHub·압축 해제 없이 한 번에 설치·업데이트.'
                : '다른 OS용이어도 버튼 한 번으로 파일을 받을 수 있어요. 실행은 해당 기기에서 하세요.'}
          </p>
        </div>` : '';

      const otherIds = ids.filter(pid => pid !== activePlatformId);
      let othersHtml = '';
      if (otherIds.length) {
        if (isMobileVisitor()) {
          const mobileOthers = otherIds.filter(pid => isMobilePlatform(pid));
          const desktopOthers = otherIds.filter(pid => isDesktopPlatform(pid));
          if (mobileOthers.length) {
            othersHtml += '<p class="text-xs text-zinc-500 mt-6 mb-2">다른 모바일</p><div class="flex flex-wrap justify-center gap-2">'
              + mobileOthers.map(pid => renderLinkButton(app, pid, { compact: true })).filter(Boolean).join('') + '</div>';
          }
          if (desktopOthers.length) {
            othersHtml += `<details class="mt-4 max-w-md mx-auto text-left">
              <summary class="text-xs text-zinc-500 cursor-pointer select-none">PC용 다운로드 보기 (이 휴대폰에서는 실행 불가)</summary>
              <div class="flex flex-wrap gap-2 mt-3">${desktopOthers.map(pid => renderLinkButton(app, pid, { compact: true, forceMismatch: true })).filter(Boolean).join('')}</div>
            </details>`;
          }
        } else {
          const row = otherIds.map(pid => renderLinkButton(app, pid, { compact: true })).filter(Boolean).join('');
          if (row) othersHtml = '<div class="flex flex-wrap justify-center gap-2 mt-6">' + row + '</div>';
        }
      }

      return `
        <div class="mt-10 hero-in-d3">
          <p class="text-xs uppercase tracking-widest text-zinc-500 mb-4">지원 플랫폼 · ${ids.length}개</p>
          <div class="flex flex-wrap justify-center gap-3 mb-6">${chips}</div>
          <div class="platform-detail glass rounded-2xl p-6 max-w-md mx-auto text-center enter" id="platform-detail">
            <p class="text-3xl mb-2">${active.emoji}</p>
            <p class="text-lg font-semibold text-white mb-1">${active.label}에서 사용 가능</p>
            <p class="text-sm text-zinc-400 leading-relaxed mb-1">${active.description}</p>
            <p class="text-xs text-zinc-600">${hintText}</p>
            ${mismatchBanner}
            ${dlSection}
          </div>
          ${othersHtml}
        </div>`;
    }

    function bindPlatformChips(app) {
      document.querySelectorAll('[data-pid]').forEach(btn => {
        btn.addEventListener('click', () => {
          activePlatformId = btn.dataset.pid;
          const hero = document.getElementById('hero');
          const scrollY = window.scrollY;
          renderHero(app);
          window.scrollTo(0, scrollY);
        });
      });
    }

    function renderHero(app) {
      const hero = document.getElementById('hero');
      if (!app) { hero.innerHTML = '<p class="text-zinc-500 text-center">앱이 없습니다.</p>'; return; }
      const accent = appAccent(app);
      document.documentElement.style.setProperty('--app-accent', accent);
      const cat = CATEGORY_LABELS[app.category] || app.category;
      const story = appStory(app);
      hero.innerHTML = `
        <div class="text-center max-w-2xl mx-auto">
          <div class="text-5xl mb-6 app-icon-float hero-in">${app.icon}</div>
          <p class="text-xs uppercase tracking-widest mb-3 hero-in-d1" style="color:${accent}">${cat} · ${platformLabel(app)}</p>
          <h2 class="text-4xl md:text-5xl font-bold text-white mb-4 hero-in-d1">${app.name}</h2>
          <p class="text-lg text-zinc-300 mb-6 hero-in-d2">${app.tagline}</p>
          <div class="glass rounded-2xl p-6 text-left mb-8 hero-in-d2">
            <p class="text-xs uppercase tracking-widest text-zinc-500 mb-3">이 앱에 대해</p>
            <p class="story-block text-sm md:text-base">${story}</p>
          </div>
          ${renderPlatformSection(app)}
          <p class="text-xs text-zinc-600 mt-8">v${app.version}</p>
        </div>`;
      bindPlatformChips(app);
    }

    function renderList() {
      const app = APPS.find(a => a.id === selectedAppId) ?? APPS[0];
      if (app) {
        selectedAppId = app.id;
        activePlatformId = null;
        renderHero(app);
      }
    }

    function renderCategories() {}

        function detectVisitorOs() {
      const ua = navigator.userAgent || '';
      const plat = (navigator.userAgentData?.platform || navigator.platform || '').toLowerCase();
      if (/win/i.test(ua) || plat.includes('win')) return 'windows';
      if (/mac/i.test(ua) || plat.includes('mac')) return 'macos';
      return null;
    }

    function renderManagerBar() {
      if (!MANAGER_SELF?.show) return;
      const bar = document.getElementById('wdm-bar');
      if (!bar) return;
      const os = detectVisitorOs();
      const meta = {
        windows: { emoji: '🪟', label: 'Windows', ext: '.exe' },
        macos: { emoji: '🍎', label: 'Mac', ext: '.dmg' }
      };
      const buttons = ['windows', 'macos'].map(pid => {
        const url = (MANAGER_SELF.downloads?.[pid] || '').trim();
        const m = meta[pid];
        const isCurrent = os === pid;
        const cls = [
          'wdm-bar-btn inline-flex items-center gap-2 rounded-xl px-3 py-2 text-xs font-semibold border',
          url ? 'bg-white/5 hover:bg-white/10 border-white/10 text-zinc-200' : 'is-disabled bg-white/5 border-white/5 text-zinc-500',
          isCurrent && url ? 'is-current' : ''
        ].filter(Boolean).join(' ');
        if (!url) {
          return `<span class="${cls}">${m.emoji} ${m.label} 준비 중</span>`;
        }
        return `<button type="button" data-wdm-manager-dl="${pid}" class="${cls}"${isCurrent ? ' title="이 기기용 다운로드 · 업데이트"' : ''}>${m.emoji} ${m.label} ${m.ext}</button>`;
      }).join('');

      bar.innerHTML = `
        <div class="max-w-6xl mx-auto flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div class="min-w-0">
            <p class="text-sm font-semibold text-white flex items-center gap-2 flex-wrap">
              <span aria-hidden="true">🌐</span>
              <span>Web Deploy 다운로드</span>
              <span class="text-[10px] px-2 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300">v${MANAGER_SELF.version}</span>
            </p>
            <p class="text-xs text-zinc-500 mt-0.5">이 랜딩 페이지를 만드는 Manager 앱 — 업데이트가 필요할 때 받으세요</p>
          </div>
          <div class="flex flex-wrap gap-2 shrink-0">${buttons}</div>
        </div>`;
    }

    renderCreatorStudio();
    renderAppNav();
    renderList();
    renderGallery();
    renderManagerBar();
  </script>
</body>
</html>
